name: Sync data-branch to Gitee

on:
  schedule:
    # 每天北京时间 08:00（UTC 00:00）
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync-data:
    runs-on: ubuntu-latest

    steps:
      - name: Clone GitHub data branch
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

          echo "Cloning data branch..."
          git clone --branch data \
            https://github.com/dw-dengwei/daily-arXiv-ai-enhanced.git \
            temp-repo

      # 新增步骤：配置 SSH 环境并加载你刚才保存的私钥
      - name: Setup SSH Keys
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.GITEE_SSH_PRIVATE_KEY }}

      # 新增步骤：将 Gitee 加入已知主机，防止 SSH 首次连接时询问 yes/no 卡死
      - name: Add Gitee to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -t ed25519 gitee.com >> ~/.ssh/known_hosts

      - name: Sync to Gitee
        run: |
          cd temp-repo

          echo "Adding Gitee remote via SSH..."
          # 这里改成了 SSH 的连接格式，不再走容易报错的 HTTPS 了
          git remote add gitee git@gitee.com:${{ secrets.GITEE_USER }}/daily-arXiv-ai-enhanced-mirror.git

          echo "Fetching Gitee branch (if exists)..."
          git fetch gitee data || true

          # 差异判断逻辑保持不变
          if git rev-parse FETCH_HEAD >/dev/null 2>&1; then
            echo "Comparing with remote..."
            if git diff --quiet HEAD FETCH_HEAD; then
              echo "No changes detected. Skipping push."
              exit 0
            fi
          else
            echo "No existing remote branch, will push directly."
          fi

          echo "Pushing to Gitee..."
          # 改为了 --force 强推，作为镜像库这比 --force-with-lease 更稳定
          git push --force gitee data:data

          echo "Sync completed."
