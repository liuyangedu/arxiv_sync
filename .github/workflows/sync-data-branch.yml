name: Sync data-branch to Gitee

on:
  schedule:
    # 每天北京时间 08:00（UTC 00:00）
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync-data:
    runs-on: ubuntu-latest

    steps:
      - name: Clone GitHub data branch
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

          echo "Cloning data branch..."
          git clone --branch data --depth 1 \
            https://github.com/dw-dengwei/daily-arXiv-ai-enhanced.git \
            temp-repo

      - name: Sync to Gitee
        run: |
          cd temp-repo

          echo "Adding Gitee remote..."
          git remote add gitee \
            https://${{ secrets.GITEE_USER }}:${{ secrets.GITEE_TOKEN }}@gitee.com/${{ secrets.GITEE_USER }}/daily-arXiv-ai-enhanced-mirror.git

          echo "Fetching Gitee branch (if exists)..."
          git fetch gitee data || true

          # 如果 Gitee 上已有 data 分支，则做差异判断
          if git rev-parse FETCH_HEAD >/dev/null 2>&1; then
            echo "Comparing with remote..."

            if git diff --quiet HEAD FETCH_HEAD; then
              echo "No changes detected. Skipping push."
              exit 0
            fi
          else
            echo "No existing remote branch, will push directly."
          fi

          echo "Pushing to Gitee..."
          GIT_TRACE=1 GIT_CURL_VERBOSE=1 git push --force-with-lease gitee data:data

          echo "Sync completed."
